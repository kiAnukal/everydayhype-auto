name: daily-carousel

on:
  schedule:
    - cron: "30 6 * * *"      # 06:30 UTC daily (adjust to your audience)
  workflow_dispatch:           # manual run button
    inputs:
      dry_run:
        description: "Generate only, do not post"
        type: boolean
        default: false

permissions:
  contents: write              # to commit updated state/ ledger back

jobs:
  carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: System deps (ffmpeg + chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg google-chrome-stable || sudo apt-get install -y -qq ffmpeg chromium-browser

      - name: Python deps
        run: pip install -r requirements.txt

      - name: Kaggle auth (KGAT access token)
        run: |
          mkdir -p ~/.kaggle
          printf '%s' "${{ secrets.KAGGLE_ACCESS_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Run pipeline
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN:         ${{ secrets.HF_TOKEN }}
          CLOUDINARY_URL:   ${{ secrets.CLOUDINARY_URL }}
          IG_ACCESS_TOKEN:  ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          CHROME_BIN:       /usr/bin/google-chrome
        run: python pipeline.py ${{ (inputs.dry_run && '--dry-run') || '' }}

      - name: Upload preview slides
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-slides
          path: work/slides/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Persist ledger/history
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "everydayhype-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ && git commit -m "ledger: $(date -u +%F)" || echo "no changes"
          git push || echo "push skipped"
