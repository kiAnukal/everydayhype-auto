name: daily-carousel

on:
  # NOTE: no `schedule:` here on purpose. GitHub's scheduled cron is heavily delayed (a "06:30"
  # run was landing ~12:33 UTC), which broke the "draft in the morning" goal. Instead the
  # Cloudflare Worker's punctual cron (wrangler.toml [triggers], 03:40 UTC / 09:10 IST)
  # dispatches this workflow — and workflow_dispatch runs start promptly.
  workflow_dispatch:           # manual run button + Worker/agent dispatch target
    inputs:
      dry_run:
        description: "Generate only, do not post"
        type: boolean
        default: false
      force_style:
        description: "Force art style: iso (isometric 3D diorama) | glossy (octane 3D) | '' = normal rotation"
        type: string
        default: ""

permissions:
  contents: write              # to commit updated state/ ledger back

jobs:
  carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: System deps (ffmpeg + chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg google-chrome-stable || sudo apt-get install -y -qq ffmpeg chromium-browser

      - name: Python deps
        run: pip install -r requirements.txt

      - name: Cache u2net model (rembg cut-outs)
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: u2net-model-v1

      - name: Kaggle auth (KGAT access token)
        run: |
          mkdir -p ~/.kaggle
          printf '%s' "${{ secrets.KAGGLE_ACCESS_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Run pipeline
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN:         ${{ secrets.HF_TOKEN }}
          CLOUDINARY_URL:   ${{ secrets.CLOUDINARY_URL }}
          IG_ACCESS_TOKEN:  ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          CHROME_BIN:       /usr/bin/google-chrome
          FORCE_STYLE:      ${{ inputs.force_style }}
        run: python pipeline.py ${{ (inputs.dry_run && '--dry-run') || '' }}

      - name: Upload preview slides
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-slides
          path: work/slides/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Persist queued post (state/pending.json)
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "everydayhype-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/
          git commit -m "queue: $(date -u +%F)" || echo "no changes"
          # The freshly generated post is authoritative. Bring in remote history but keep OUR
          # state/*.json whenever it conflicts — this stops the old --autostash rebase from
          # committing <<<<<< merge-conflict markers when the Telegram worker wrote pending.json
          # at the same instant (that corruption was breaking every button tap afterwards).
          for i in 1 2 3; do
            git fetch origin main || true
            git merge -X ours --no-edit origin/main || { git merge --abort || true; }
            git push && break || { echo "push race; retrying in 5s"; sleep 5; }
          done
