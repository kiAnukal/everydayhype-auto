name: telegram-maintain
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min — drain training queue + enforce auto-post deadline
  workflow_dispatch:

permissions:
  contents: write              # commit examples.md / pending.json back

concurrency:
  group: telegram-maintain
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Deps (openai + requests + file parsers)
        run: pip install -q openai requests pypdf openpyxl

      - name: Drain training queue + auto-post on deadline
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          IG_ACCESS_TOKEN:    ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
        run: python -c "import sys; sys.path.insert(0,'.'); from steps import agent; agent.maintain()"

      - name: Persist state (examples / pending / queue)
        run: |
          git config user.name  "everydayhype-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add examples.md state/ 2>/dev/null || true
          git commit -m "maintain: telegram state $(date -u +%F-%H%M)" || echo "no changes"
          git push || echo "push skipped"
